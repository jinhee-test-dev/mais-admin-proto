      left: 22px;

      return 'bg-slate-50 text-slate-400 border-slate-100';

    function renderAdminMain() {
      const ws = state.currentWorkspace;
      if (!ws) return '';
      const members = getMembersForWorkspace(ws.id);

      return `

                  <button data-action="switch-workspace" data-workspace-id="${w.id}"

                  <button data-action="goto-workspace-selection" class="w-full flex items-center gap-3 px-5 py-3 hover:bg-slate-700 transition-colors text-left text-slate-400 text-sm">

                <div>

                  </button>
                  ${state.activeServiceMenu === svc.id ? `
                  <div class="ml-8 mt-1 space-y-0.5 mb-2 slide-down">
                    ${svc.features.map(f => `
                      <button data-action="select-submenu" data-submenu="${f.name}" data-feature-id="${f.id}" data-service-id="${svc.id}"
                              class="w-full text-left px-3 py-2 rounded-md text-sm transition-all ${state.activeSubMenu === f.name ? 'text-indigo-400 bg-indigo-500/10 font-semibold' : 'text-slate-500 hover:text-slate-300 hover:bg-slate-800'}">
                        ${f.name}

                  </div>` : ''}

              `).join('')}

              <div class="px-3 py-2 mt-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest">관리</div>
              <button data-action="goto-accounts"
                      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all ${state.activeSection === 'accounts' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-900/50' : 'text-slate-400 hover:bg-slate-800'}">
                ${icons.users}
                <span class="font-semibold text-sm">계정 관리</span>
              </button>
              ${state.isSuperAdmin ? `
              <button data-action="goto-super-admin" data-tab="tenants"
                      class="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-all text-slate-400 hover:bg-slate-800">
                ${icons.layers}
                <span class="font-semibold text-sm">Super Admin</span>
                <span class="ml-auto text-[10px] bg-purple-500/20 text-purple-300 px-2 py-0.5 rounded-full font-bold">SA</span>
              </button>
              ` : ''}
            </nav>

            <div class="p-3 border-t border-slate-800">
              <button data-action="logout" class="w-full flex items-center gap-3 px-3 py-2.5 text-slate-500 hover:text-red-400 hover:bg-slate-800 rounded-lg transition-all">
                ${icons.logOut}
                <span class="font-medium text-sm">로그아웃</span>
              </button>
            </div>
          </div>

          <!-- Main Content -->
          <div class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0">
              <div class="flex items-center gap-3 text-sm">
                <span class="text-slate-400">${icons.globe}</span>
                <span class="font-bold text-slate-900">${ws.name}</span>
                ${state.activeSection === 'accounts' ? `<span class="text-slate-300">/</span><span class="font-medium text-slate-500">계정 관리</span>` : ''}
                ${state.activeServiceMenu ? `
                  <span class="text-slate-300">/</span>
                  <span class="font-medium text-slate-500">${allServices.find(s => s.id === state.activeServiceMenu)?.name || ''}</span>
                ` : ''}
                ${state.activeSubMenu ? `<span class="text-slate-300">/</span><span class="font-medium text-slate-500">${state.activeSubMenu}</span>` : ''}
              </div>
              <div class="flex items-center gap-4">
                <div class="relative">
                  <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${icons.search}</span>
                  <input type="text" placeholder="통합 검색..." class="bg-slate-100 pl-10 pr-4 py-2 rounded-full text-sm w-64 outline-none focus:ring-2 focus:ring-indigo-500" />

                <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold text-sm border border-indigo-200">박</div>

            <main class="flex-1 overflow-auto p-8">

          ${state.isDeleteModalOpen ? renderDeleteModal() : ''}
        </div>`;
    }

    function renderServiceContent() {
      if (!state.activeSubMenu) {
        return `
          <div class="flex items-center justify-center h-full text-slate-400 flex-col gap-4">
            <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-2">
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
            </div>
            <p class="font-medium text-lg">좌측 서비스 메뉴를 선택해 주세요</p>
            <p class="text-sm text-slate-400">워크스페이스의 활성화된 서비스와 하위 관리 기능을 이용할 수 있습니다.</p>
          </div>`;
      }

      // Feature-specific logic
      const svc = allServices.find(s => s.id === state.activeServiceMenu);
      const featureName = state.activeSubMenu;

      return `
        <div class="max-w-5xl mx-auto fade-in">
          <div class="flex items-center gap-2 text-xs font-bold text-indigo-600 uppercase tracking-widest mb-2">
            <span>${svc?.icon} ${svc?.name}</span>
            <span class="text-slate-300">/</span>
            <span>${featureName}</span>
          </div>
          <h2 class="text-2xl font-bold text-slate-900 mb-2">${featureName}</h2>
          <p class="text-slate-500 mb-8">${svc?.name}의 ${featureName} 세부 관리 화면입니다.</p>
          
          <div class="bg-white rounded-3xl border border-slate-200 shadow-sm overflow-hidden min-h-[400px] flex flex-col items-center justify-center p-12 text-center group">
            <div class="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mb-6 group-hover:bg-indigo-50 transition-colors">
              <span class="text-4xl opacity-50 group-hover:scale-125 transition-transform group-hover:opacity-100">${svc?.icon}</span>
            </div>
            <h3 class="text-xl font-bold text-slate-900 mb-2">${featureName} — 기능 구현 중</h3>
            <p class="text-slate-500 max-w-md leading-relaxed">
              본 모듈은 개발 및 디자인 가이드에 따라 구성될 예정입니다.<br/>
              현재 인터페이스 프로토타입 단계입니다.
            </p>
            <div class="mt-8 flex gap-3">
              <button class="px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-bold text-sm hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">${featureName} 시작하기</button>
              <button class="px-6 py-2.5 bg-slate-100 text-slate-600 rounded-xl font-bold text-sm hover:bg-slate-200 transition-all">가이드 보기</button>
            </div>
          </div>
        </div>`;
    }

    function renderMainSection(ws, members) {
      if (state.activeSection === 'accounts') return renderAccountsContent(ws, members);
      return renderServiceContent();
    }

    function isCustomized(member) {
      if (!member.services) return false;
      const baseRole = (member.role || 'viewer').toLowerCase();
      return member.services.some(srv => {
        if (srv.role.toLowerCase() !== baseRole) return true;
        if (srv.features && srv.features.some(f => f.role.toLowerCase() !== baseRole)) return true;
        return false;
      });
    }

    function renderServiceCleanIcons(member) {
      let displayServices = member.services || [];
      
      // Fallback: If no services defined, show all workspace enabled services with the base role
      if (displayServices.length === 0 && state.currentWorkspace) {
        const workspaceServices = getWorkspaceServices(state.currentWorkspace);
        const baseRole = (member.role || 'viewer').toLowerCase();
        displayServices = workspaceServices.map(srv => ({
          id: srv.id,
          role: baseRole,
          features: srv.features ? srv.features.map(f => ({ id: f.id, role: baseRole })) : []
        }));
      }

      if (displayServices.length === 0) return '<span class="text-slate-300 text-xs italic">No access</span>';
      
      return displayServices.map(ms => {
        const srv = state.allServices.find(s => s.id === ms.id);
        if (!srv) return '';

        return `
          <div class="service-icon-group relative cursor-default">
            <div class="w-8 h-8 rounded-lg bg-slate-50 border border-slate-100 flex items-center justify-center text-sm shadow-sm hover:bg-white hover:border-slate-200 transition-all">
              ${srv.icon}
            </div>

            <div class="rich-tooltip absolute bottom-full left-1/2 mb-3 w-52 bg-white border border-slate-200 shadow-2xl rounded-2xl p-4 pointer-events-none">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b border-slate-100 pb-2 mb-2">${srv.name}</p>
                <div class="space-y-2">
                    ${ms.features ? ms.features.map(f => {
                      const featInfo = srv.features.find(sf => sf.id === f.id);
                      const role = (f.role || 'viewer').toUpperCase();
                      return `
                        <div class="flex justify-between items-center gap-3">
                            <span class="text-[11px] font-bold text-slate-600 truncate">${featInfo?.name || f.id}</span>
                            <span class="text-[9px] font-black px-1.5 py-0.5 rounded leading-none shrink-0 role-badge-${role.toLowerCase()}">${role}</span>
                        </div>
                      `;
                    }).join('') : ''}
                </div>
                <div class="absolute top-full left-1/2 -translate-x-1/2 w-3 h-3 bg-white border-b border-r border-slate-200 rotate-45 -mt-1.5"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAccountsContent(ws, members) {
      const filtered = members.filter(m => {
        const roleMatch = state.memberFilterRole === 'all' || m.role === state.memberFilterRole;
        const searchMatch = m.name.toLowerCase().includes(state.memberSearchQuery.toLowerCase()) ||
          m.email.toLowerCase().includes(state.memberSearchQuery.toLowerCase());
        return roleMatch && searchMatch;
      });
      return `
        <div class="max-w-6xl mx-auto space-y-6 text-sm">
          <div class="flex justify-between items-end">
            <div>
              <p class="text-[11px] font-bold text-indigo-500 uppercase tracking-widest mb-1 leading-none">Total Members: ${members.length}</p>
              <h2 class="text-2xl font-black text-slate-900 leading-tight">계정 관리</h2>
              <p class="text-[11px] text-indigo-500 font-bold mt-2 flex items-center gap-1">
                ${icons.alert} 허용 도메인: @${ws.allowedDomains.join(', ')} (해당 도메인 계정만 관리자로 등록 가능합니다.)
              </p>
            </div>
            <button data-action="open-invite" class="bg-[#5C5CFF] hover:bg-[#4B4BFF] text-white px-5 py-2.5 rounded-xl font-bold transition-all flex items-center gap-2 shadow-lg shadow-indigo-100">
              ${icons.plus} 팀원 초대하기
            </button>
          </div>

          <!-- 필터 툴바 -->
          <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm flex flex-col lg:flex-row items-center gap-3">
            <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl px-2 shrink-0 w-full lg:w-auto">
              <span class="text-slate-400 p-2">${icons.shield}</span>
              <select onchange="state.memberFilterRole = this.value; render();" 
                      class="bg-transparent py-2 pr-4 text-sm font-bold text-slate-600 outline-none w-full">
                <option value="all" ${state.memberFilterRole === 'all' ? 'selected' : ''}>전체 역할</option>
                <option value="admin" ${state.memberFilterRole === 'admin' ? 'selected' : ''}>Admin</option>
                <option value="editor" ${state.memberFilterRole === 'editor' ? 'selected' : ''}>Editor</option>
                <option value="viewer" ${state.memberFilterRole === 'viewer' ? 'selected' : ''}>Viewer</option>
              </select>
            </div>

            <div class="relative flex-1 w-full">
              <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">${icons.search}</span>
              <input type="text" placeholder="사용자명 또는 이메일로 검색" 
                     value="${state.memberSearchQuery}"
                     oninput="state.memberSearchQuery = this.value; render();"
                     class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all text-sm font-medium" />
            </div>

            <div class="px-4 py-2 bg-indigo-50 rounded-xl border border-indigo-100 hidden lg:block text-center whitespace-nowrap">
              <span class="text-[10px] font-black text-indigo-400 uppercase block leading-none mb-1 text-center">Results</span>
              <span class="text-sm font-black text-indigo-600 leading-none tabular-nums">${filtered.length}</span>
            </div>
          </div>
          
          <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-visible text-[13px]">
            <table class="w-full text-left">
              <thead class="bg-slate-50 border-b border-slate-200">
                <tr>
                  <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest">사용자 정보</th>
                  <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest text-center">워크스페이스 역할</th>
                  <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest text-center">서비스 별 권한</th>
                  <th class="px-6 py-4 text-[11px] font-bold text-slate-400 uppercase tracking-widest text-center">관리</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-slate-100">
                ${filtered.map(m => `
                  <tr class="group hover:bg-slate-50/50 transition-colors">
                    <td class="px-6 py-4">
                      <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center font-bold text-slate-400 text-[11px] uppercase">${m.name[0]}</div>
                        <div>
                          <p class="font-bold text-slate-800">${m.name}</p>
                          <p class="text-[11px] text-slate-400 font-medium">${m.email}</p>
                        </div>

                    <td class="px-6 py-4 text-center">
                       <div class="inline-flex relative">
                         <span class="font-bold text-indigo-600 text-xs">${(m.role || 'viewer').toUpperCase()}</span>
                         ${isCustomized(m) ? `
                            <div class="absolute -top-1 -right-2 w-2 h-2 bg-rose-500 rounded-full border-2 border-white ripple" title="기능 권한 개별 수정됨"></div>
                         ` : ''}
                       </div>
                    </td>
                    <td class="px-6 py-4 text-center">
                       <div class="flex justify-center items-center gap-2">
                         ${renderServiceCleanIcons(m)}
                       </div>
                    </td>

      return `

              const currentRole = featPerm ? featPerm.role : (memberSrv?.role || member.role || 'viewer');
              return `
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between py-2.5 group gap-2">

                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1 leading-none block">서비스 이름</label>
                <input required id="editServiceName" type="text" value="${svc.name}" 
                       class="w-full px-5 py-4 bg-slate-50/50 border-2 border-slate-50 rounded-[20px] outline-none focus:border-indigo-100 focus:bg-white transition-all text-sm font-bold" />
              </div>
              <div class="space-y-2">
                <label class="text-[11px] font-bold text-slate-400 uppercase tracking-widest ml-1 leading-none block">서비스 설명</label>
                <textarea required id="editServiceDesc" rows="3" 
                       class="w-full px-5 py-4 bg-slate-50/50 border-2 border-slate-50 rounded-[24px] outline-none focus:border-indigo-100 focus:bg-white transition-all text-sm font-medium resize-none">${svc.desc}</textarea>
              </div>
              
              <div class="flex flex-col gap-3 pt-4">
                <button type="submit" class="w-full py-4 bg-indigo-600 text-white font-black rounded-[20px] shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all text-[15px]">수정 완료</button>
                <button type="button" data-action="close-edit-service-modal" class="w-full py-2 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">취소</button>
              </div>
            </form>
          </div>
        </div>`;
    }

    window.handleEditService = (e) => {
      e.preventDefault();
      const name = document.getElementById('editServiceName').value;
      const desc = document.getElementById('editServiceDesc').value;

      const svc = state.allServices.find(s => s.id === state.selectedServiceId);
      if (svc) {
        svc.name = name;
        svc.desc = desc;
      }

      state.isEditServiceModalOpen = false;
      state.selectedServiceId = null;
      alert('서비스 정보가 수정되었습니다.');
      render();
    };

    window.handleCreateService = (e) => {
      e.preventDefault();
      const name = document.getElementById('serviceName').value;
      const desc = document.getElementById('serviceDesc').value;
      const selectedWsIds = Array.from(document.querySelectorAll('input[name="ws-target"]:checked')).map(cb => cb.value);

      const newServiceId = `service_${Date.now()}`;
      state.allServices.push({
        id: newServiceId,
        name,
        desc,
        icon: '✨',
        subMenus: ['설정 관리', '데이터 분석'], // 기본 서브메뉴
        features: [{ id: `feat-${Date.now()}`, name: '기본 기능' }] // 기본 피처
      });

      state.workspaces.forEach(ws => {
        if (selectedWsIds.includes(ws.id)) ws.enabledServiceIds.push(newServiceId);
      });

      state.isCreateServiceModalOpen = false;
      alert('새 서비스가 등록되었습니다.');
      render();
    };

    function renderAddMemberToTenantModal() {
      const ws = workspaces.find(w => w.id === state.selectedTenantForMember);
      if (!ws) return '';

      // 현재 이 워크스페이스에 소속되지 않은 기존 멤버 목록
      const availableMembers = allMembers.filter(m => !m.tenants.includes(ws.id));

      return `
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" data-action="close-add-member">
          <div class="bg-white w-full max-w-lg rounded-2xl shadow-2xl fade-in" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center p-6 border-b border-slate-100">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 ${ws.color} rounded-xl flex items-center justify-center text-base font-bold text-white">${ws.logo}</div>
                <div>
                  <h3 class="text-lg font-bold text-slate-900">${ws.name} — 멤버 추가</h3>
                  <p class="text-xs text-slate-500">기존 멤버를 이 워크스페이스에 추가하거나 새로 초대합니다.</p>
                </div>
              </div>
              <button data-action="close-add-member" class="text-slate-400 hover:text-slate-900 transition-colors">${icons.x}</button>
            </div>

            <!-- 기존 멤버 검색 추가 -->
            <div class="p-6 pb-3">
              <div class="text-xs font-bold text-slate-500 mb-3 uppercase">기존 멤버를 워크스페이스에 추가</div>
              <div class="relative mb-4">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${icons.search}</span>
                <input type="text" placeholder="이름 또는 이메일로 검색..." class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm" />
              </div>
              ${availableMembers.length > 0 ? `
              <div class="space-y-2 max-h-48 overflow-y-auto">
                ${availableMembers.map(m => `
                <div class="flex items-center justify-between p-3 rounded-xl border border-slate-200 hover:border-indigo-200 hover:bg-indigo-50/30 transition-all">
                  <div class="flex items-center gap-3">
                    <div class="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-sm font-bold text-slate-600">${m.name[0]}</div>
                    <div>
                      <div class="text-sm font-medium text-slate-900">${m.name}</div>
                      <div class="text-[11px] text-slate-400">${m.email}</div>
                    </div>
                  </div>
                  <button class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded-lg transition-all">추가</button>
                </div>`).join('')}
              </div>
              ` : `
              <div class="text-center py-6 text-slate-400">
                <p class="text-sm">모든 멤버가 이미 이 워크스페이스에 소속되어 있습니다.</p>
              </div>
              `}
            </div>

            <!-- 새 멤버 초대 -->
            <div class="px-6 py-4 border-t border-slate-100">
              <div class="text-xs font-bold text-slate-500 mb-3 uppercase">또는 새 멤버 초대</div>
              <div class="flex gap-2">
                <input type="email" placeholder="new@${ws.allowedDomains[0]}" class="flex-1 px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm" />
                <select class="px-3 py-2.5 rounded-xl border border-slate-200 text-sm appearance-none bg-white">
                  <option>Admin</option>
                  <option selected>Editor</option>
                  <option>Viewer</option>
                </select>
                <button class="px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl transition-all">초대</button>
              </div>
              <p class="mt-1.5 text-[11px] text-slate-400">허용 도메인: ${ws.allowedDomains.join(', ')}</p>
            </div>

            <div class="p-6 pt-3 border-t border-slate-100">
              <button data-action="close-add-member" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 rounded-xl transition-all">닫기</button>
            </div>
          </div>
        </div>`;
    }

    // ──────────────────────────────────────────
    // Event Binding
    // ──────────────────────────────────────────

    function bindEvents() {
      document.querySelectorAll('[data-action]').forEach(el => {
        el.addEventListener('click', handleAction);
      });
    }

    function handleAction(e) {
      const el = e.currentTarget;
      const action = el.dataset.action;
      const dataset = el.dataset;

      switch (action) {
        case 'login':
          if (state.isSuperAdmin) {
            navigate('select-workspace');
          } else {
            state.currentWorkspace = workspaces[0];
            state.activeSection = 'accounts';
            navigate('admin-main');
          }
          break;
        case 'forgot-password':
          navigate('forgot-password');
          break;
        case 'back-to-login':
          navigate('login');
          break;
        case 'send-reset':
          alert('재설정 링크가 이메일로 발송되었습니다.');
          navigate('login');
          break;
        case 'logout':
          state.currentWorkspace = null;
          state.activeServiceMenu = null;
          state.activeSubMenu = null;
          state.activeSection = 'service';
          navigate('login');
          break;
        case 'select-workspace': {
          const wsId = el.dataset.workspaceId;
          const ws = workspaces.find(w => w.id === wsId);
          state.activeServiceMenu = null;
          state.activeSubMenu = null;
          state.activeSection = 'service';
          navigate('admin-main', { workspace: ws });
          break;
        }
        case 'switch-workspace': {
          const wsId = el.dataset.workspaceId;
          const ws = workspaces.find(w => w.id === wsId);
          state.activeServiceMenu = null;
          state.activeSubMenu = null;
          state.activeSection = 'service';
          state.isWorkspaceDropdownOpen = false;
          navigate('admin-main', { workspace: ws });
          break;
        }
        case 'toggle-workspace-dropdown':
          state.isWorkspaceDropdownOpen = !state.isWorkspaceDropdownOpen;
          render();
          break;
        case 'goto-workspace-selection':
          navigate('select-workspace');
          break;
        case 'toggle-service': {
          const svcId = el.dataset.serviceId;
          state.activeServiceMenu = state.activeServiceMenu === svcId ? null : svcId;
          state.activeSubMenu = null;
          state.activeSection = 'service';
          render();
          break;
        }
        case 'select-submenu':
          state.activeSubMenu = el.dataset.submenu;
          if (el.dataset.serviceId) state.activeServiceMenu = el.dataset.serviceId;
          state.activeSection = 'service';
          render();
          break;
        case 'goto-accounts':
          state.activeSection = 'accounts';
          state.activeServiceMenu = null;
          state.activeSubMenu = null;
          render();
          break;

        // Account / Permission actions
        case 'toggle-action-menu': {
          const mid = parseInt(el.dataset.memberId);
          state.activeActionMenuId = state.activeActionMenuId === mid ? null : mid;
          render();
          break;
        }
        case 'open-edit-member': {
          const mid = parseInt(dataset.memberId);
          state.selectedMemberId = mid;
          state.isEditModalOpen = true;
          state.activeActionMenuId = null;

          // Default all services to ON if member has no service settings
          const member = state.allMembers.find(m => m.id === mid);
          const workspaceServices = state.currentWorkspace ? getWorkspaceServices(state.currentWorkspace) : [];
          if (member && (!member.services || member.services.length === 0)) {
            member.services = workspaceServices.map(srv => ({
              id: srv.id,
              role: member.role || 'viewer',
              features: srv.features ? srv.features.map(f => ({ id: f.id, role: member.role || 'viewer' })) : []
            }));
          }
          render();
          break;
        }
        case 'close-edit-modal':
        case 'close-edit-modal-bg':
          state.isEditModalOpen = false;
          state.expandedServices.clear();
          render();
          break;
        case 'toggle-accordion': {
          const id = el.dataset.id;
          if (state.expandedServices.has(id)) state.expandedServices.delete(id);
          else state.expandedServices.add(id);
          render();
          break;
        }
        case 'save-edit':
          alert('권한 변경사항이 저장되었습니다.');
          state.isEditModalOpen = false;
          render();
          break;
        case 'set-member-global-role': {
          const role = dataset.role;
          const member = state.allMembers.find(m => m.id === state.selectedMemberId);
          if (member) {
            member.role = role;
            render();
          }
          break;
        }
        case 'toggle-edit-service': {
          const srvId = dataset.serviceId;
          const member = state.allMembers.find(m => m.id === state.selectedMemberId);
          if (member) {
            if (!member.services) member.services = [];
            const idx = member.services.findIndex(s => s.id === srvId);
            if (idx >= 0) {
              member.services.splice(idx, 1);
            } else {
              const srv = state.allServices.find(s => s.id === srvId);
              member.services.push({ 
                id: srvId, 
                role: member.role,
                features: srv.features ? srv.features.map(f => ({ id: f.id, role: member.role, enabled: true })) : []
              });
            }
            render();
          }
          break;
        }
        case 'set-service-role': {
          const { serviceId, role } = dataset;
          const member = state.allMembers.find(m => m.id === state.selectedMemberId);
          if (member) {
            const srv = member.services?.find(s => s.id === serviceId);
            if (srv) {
              srv.role = role;
              // Optional: Sync feature roles if they exist or just keep them independent
              render();
            }
          }
          break;
        }

        case 'set-feature-role': {
          const { serviceId, featureId, role } = dataset;
          const member = state.allMembers.find(m => m.id === state.selectedMemberId);
          if (member) {
            const srv = member.services?.find(s => s.id === serviceId);
            if (srv) {
              if (!srv.features) srv.features = [];
              const feat = srv.features.find(f => f.id === featureId);
              if (feat) {
                feat.role = role;
              } else {
                srv.features.push({ id: featureId, role: role, enabled: true });
              }
              render();
            }
          }
          break;
        }
        case 'open-delete-member':
          state.selectedMemberId = parseInt(el.dataset.memberId);
          state.isDeleteModalOpen = true;
          state.activeActionMenuId = null;
          render();
          break;
        case 'close-delete-modal':
        case 'close-delete-modal-bg':
          state.isDeleteModalOpen = false;
          render();
          break;
        case 'confirm-delete':
          state.allMembers = state.allMembers.filter(m => m.id !== state.selectedMemberId);
          state.isDeleteModalOpen = false;
          alert('계정이 삭제되었습니다.');
          render();
          break;

        // Super Admin
        case 'goto-super-admin':
          state.superAdminTab = el.dataset.tab || 'tenants';
          navigate('super-admin');
          break;
        case 'sa-tab':
          state.superAdminTab = el.dataset.tab;
          render();
          break;
        case 'sa-member-filter':
          state.superAdminMemberFilter = el.dataset.filter;
          render();
          break;
        case 'sa-tab-members-filter':
          state.superAdminTab = 'members';
          state.memberFilterWorkspace = el.dataset.filter;
          render();
          break;
        case 'open-create-tenant':
          state.isCreateTenantModalOpen = true;
          render();
          break;
        case 'close-create-tenant':
          state.isCreateTenantModalOpen = false;
          render();
          break;
        case 'confirm-create-tenant':
          alert('새 테넌트가 생성되었습니다.');
          state.isCreateTenantModalOpen = false;
          render();
          break;
        case 'open-edit-tenant':
          state.selectedTenantId = el.dataset.tenantId;
          state.isEditTenantModalOpen = true;
          render();
          break;
        case 'close-edit-tenant':
          state.isEditTenantModalOpen = false;
          state.selectedTenantId = null;
          render();
          break;
        case 'open-service-manage':
          state.selectedTenantForService = el.dataset.tenantId;
          state.isServiceManageModalOpen = true;
          render();
          break;
        case 'close-service-manage':
          state.isServiceManageModalOpen = false;
          render();
          break;
        case 'open-add-member-to-tenant':
          state.selectedTenantForMember = el.dataset.tenantId;
          state.isAddMemberToTenantModalOpen = true;
          render();
          break;
        case 'close-add-member':
          state.isAddMemberToTenantModalOpen = false;
          render();
          break;
        case 'open-service-modal':
          state.isCreateServiceModalOpen = true;
          render();
          break;
        case 'close-service-modal':
          state.isCreateServiceModalOpen = false;
          render();
          break;
        case 'open-edit-service':
          state.selectedServiceId = el.dataset.serviceId;
          state.isEditServiceModalOpen = true;
          render();
          break;
        case 'close-edit-service-modal':
          state.isEditServiceModalOpen = false;
          state.selectedServiceId = null;
          render();
          break;
        case 'delete-service': {
          if (confirm('이 서비스를 정말 삭제하시겠습니까? 삭제 시 모든 워크스페이스에서 해당 기능이 제거됩니다.')) {
            const svcId = el.dataset.serviceId;
            state.allServices = state.allServices.filter(s => s.id !== svcId);
            state.workspaces.forEach(ws => {
              ws.enabledServiceIds = ws.enabledServiceIds.filter(id => id !== svcId);
            });
            alert('서비스가 삭제되었습니다.');
            render();
          }
          break;
        }
        case 'toggle-service-for-tenant': {
          const svcId = el.dataset.serviceId;
          const tenantId = el.dataset.tenantId;
          const ws = workspaces.find(w => w.id === tenantId);
          if (ws) {
            const idx = ws.enabledServiceIds.indexOf(svcId);
            if (idx >= 0) ws.enabledServiceIds.splice(idx, 1);
            else ws.enabledServiceIds.push(svcId);
          }
          render();
          break;
        }

        // Common modals
        case 'open-invite':
          state.isInviteModalOpen = true;
          render();
          break;
        case 'close-invite':
        case 'close-modal-bg':
          state.isInviteModalOpen = false;
          render();
          break;
        case 'confirm-invite': {
          const email = document.getElementById('invite-email')?.value;
          if (!email) {
            alert('이메일 주소를 입력해 주세요.');
            return;
          }
          
          const serviceRoles = [];
          document.querySelectorAll('.invite-service-role-select').forEach(sel => {
            const srvId = sel.dataset.serviceId;
            const role = sel.value;
            const srv = state.allServices.find(s => s.id === srvId);
            serviceRoles.push({
              id: srvId,
              role: role,
              features: srv.features ? srv.features.map(f => ({ id: f.id, role: role, enabled: true })) : []
            });
          });

          const newMember = {
            id: Date.now(),
            name: email.split('@')[0],
            email: email,
            role: 'editor', // 기본 워크스페이스 역할
            status: 'pending',
            workspaceId: state.currentWorkspace.id,
            services: serviceRoles
          };

          state.allMembers.push(newMember);
          alert('초대 메일이 발송되었습니다.');
          state.isInviteModalOpen = false;
          render();
          break;
        }
        case 'resend-invite': {
          const mid = parseInt(el.dataset.memberId);
          const member = state.allMembers.find(m => m.id === mid);
          if (member) {
            if (confirm(`${member.name}님에게 초대 메일을 다시 발송하시겠습니까?`)) {
              alert(`${member.email} 주소로 초대 메일이 재발송되었습니다.`);
            }
          }
          break;
        }
      }
    }

    // ──────────────────────────────────────────
    // Init
    // ──────────────────────────────────────────
    render();
  </script>


</body></html>
